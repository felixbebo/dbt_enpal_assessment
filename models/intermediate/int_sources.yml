version: 2

models:
  - name: int_deal_hist
    description: Deal history table with one row per effective state change.
    columns:
      - name: deal_id
        tests:
          - not_null
      - name: valid_from
        tests:
          - not_null
      - name: created_at
        tests:
          - not_null
      - name: stage_id
        tests:
          - relationships:
              arguments:
                to: ref('stg_stages')
                field: stage_id
      - name: lost_reason_id
        tests:
          - relationships:
              arguments:
                to: ref('int_lost_reasons')
                field: lost_reason_id
  - name: int_deal_latest
    description: Current deal snapshot based on the latest history row.
    columns:
      - name: deal_id
        tests:
          - not_null
          - unique
      - name: created_at
        tests:
          - not_null
  - name: int_lost_reasons
    description: Normalized lookup table for lost reason labels.
    columns:
      - name: lost_reason_id
        tests:
          - not_null
          - unique
      - name: lost_reason_name
        tests:
          - not_null
  - name: int_deal_activity
    description: Enriched activity fact table with activity type labels.
    columns:
      - name: activity_id
        tests:
          - not_null
      - name: deal_id
        tests:
          - not_null
      - name: activity_type_code
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_activity_types')
                field: activity_type_code
