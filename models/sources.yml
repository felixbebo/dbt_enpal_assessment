version: 2

sources:
  - name: postgres_public
    description: Raw tables loaded into the local Postgres database from CSV files.
    database: postgres
    schema: public
    tables:
      - name: activity
        description: Activity events linked to deals and users.
        columns:
          - name: activity_id
            tests:
              - not_null
          - name: deal_id
            tests:
              - not_null
          - name: assigned_to_user
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('postgres_public', 'users')
                    field: id
          - name: type
            tests:
              - not_null

      - name: activity_types
        description: Lookup table for activity type codes.
        columns:
          - name: id
            tests:
              - not_null
              - unique
          - name: name
            tests:
              - not_null
          - name: type
            tests:
              - not_null
          - name: active
            tests:
              - not_null

      - name: deal_changes
        description: Event log of deal-level changes such as stage updates, owner changes, and deal creation.
        columns:
          - name: deal_id
            tests:
              - not_null
          - name: change_time
            tests:
              - not_null
          - name: changed_field_key
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: ['add_time', 'user_id', 'stage_id', 'lost_reason']
          - name: new_value
            tests:
              - not_null

      - name: fields
        description: Metadata table that maps field keys to business concepts and stage labels.
        columns:
          - name: ID
            tests:
              - not_null
              - unique
          - name: FIELD_KEY
            tests:
              - not_null

      - name: stages
        description: Lookup table for stage identifiers and stage names.
        columns:
          - name: stage_id
            tests:
              - not_null
              - unique
          - name: stage_name
            tests:
              - not_null

      - name: users
        description: User dimension table with owner details.
        columns:
          - name: id
            tests:
              - not_null
              - unique
          - name: email
            tests:
              - not_null
